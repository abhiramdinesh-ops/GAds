name: Google Ads to Sheets

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          ADS_CLIENT_ID:       ${{ secrets.ADS_CLIENT_ID }}
          ADS_CLIENT_SECRET:   ${{ secrets.ADS_CLIENT_SECRET }}
          ADS_REFRESH_TOKEN:   ${{ secrets.ADS_REFRESH_TOKEN }}
          DEVELOPER_TOKEN:     ${{ secrets.DEVELOPER_TOKEN }}
          SHEETS_CLIENT_ID:    ${{ secrets.SHEETS_CLIENT_ID }}
          SHEETS_CLIENT_SECRET: ${{ secrets.SHEETS_CLIENT_SECRET }}
          SHEETS_REFRESH_TOKEN: ${{ secrets.SHEETS_REFRESH_TOKEN }}
          SHEET_ID:            ${{ secrets.SHEET_ID }}
        run: python ads_to_sheets.py
